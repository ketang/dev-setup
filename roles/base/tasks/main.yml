- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - bind9-dnsutils
      - bind9-host
      - build-essential
      - curl
      - wget
      - git
      - git-lfs
      - unzip
      - jq
      - bc
      - htop
      - tmux
      - ripgrep
      - fd-find
      - make
      - cmake
      - pkg-config
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - apt-transport-https
      - keychain
      - locales
      - wamerican
      - net-tools
      - socat
      - snapd
      - bubblewrap
      - xauth
      - x11-apps
      - xvfb
      - feh
      - xdg-utils
      - strace
      - pipx
    state: present

- name: Install glow via snap
  community.general.snap:
    name: glow
    state: present

- name: Generate locale
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Set default locale
  lineinfile:
    path: /etc/default/locale
    regexp: "^LANG="
    line: "LANG=en_US.UTF-8"
    create: true

- name: Set hostname
  hostname:
    name: "{{ hostname }}"
  when: hostname | length > 0

- name: Add hostname to /etc/hosts
  lineinfile:
    path: /etc/hosts
    regexp: '^\s*127\.0\.1\.1\s'
    line: "127.0.1.1 {{ hostname }}"
  when: hostname | length > 0

- name: Persist hostname in wsl.conf
  blockinfile:
    path: /etc/wsl.conf
    block: |
      [network]
      hostname = {{ hostname }}
    marker: "# {mark} ANSIBLE MANAGED - hostname"
  when: hostname | length > 0

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Ensure mount points exist for optional fstab entries
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ fstab_entries }}"
  when:
    - fstab_entries | length > 0
    - item.path is defined
    - item.path not in ['none', 'swap']

- name: Remove optional fstab entries block when unset
  blockinfile:
    path: /etc/fstab
    marker: "# {mark} ANSIBLE MANAGED - optional mounts"
    state: absent
  when: fstab_entries | length == 0

- name: Manage optional fstab entries
  blockinfile:
    path: /etc/fstab
    marker: "# {mark} ANSIBLE MANAGED - optional mounts"
    block: |
      {% for entry in fstab_entries %}
      {{ entry.src }} {{ entry.path }} {{ entry.fstype }} {{ entry.opts | default('defaults,nofail') }} {{ entry.dump | default(0) }} {{ entry.passno | default(0) }}
      {% endfor %}
  when: fstab_entries | length > 0
