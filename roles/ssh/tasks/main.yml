- name: Install OpenSSH server
  apt:
    name: openssh-server
    state: present

- name: Set SSH port
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?Port "
    line: "Port {{ ssh_port }}"
  notify: Restart sshd

- name: Enable pubkey authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PubkeyAuthentication"
    line: "PubkeyAuthentication yes"
  notify: Restart sshd

- name: Enable X11 forwarding
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?X11Forwarding"
    line: "X11Forwarding yes"
  notify: Restart sshd

- name: Allow X11 forwarding from non-localhost
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?X11UseLocalhost"
    line: "X11UseLocalhost no"
  notify: Restart sshd

- name: Disable ssh.socket (uses hardcoded port 22, ignores sshd_config)
  systemd:
    name: ssh.socket
    enabled: false
    state: stopped

- name: Enable SSH service
  systemd:
    name: ssh
    enabled: true
    state: started

# --- Windows SSH agent forwarding via npiperelay ---

- name: Install npiperelay (cross-compile for Windows)
  shell: |
    su -l {{ user }} -c 'GOOS=windows GOARCH=amd64 GOPATH="$HOME/go" PATH="/usr/local/go/bin:$PATH" go install github.com/jstarks/npiperelay@latest'
  args:
    creates: "/home/{{ user }}/go/bin/windows_amd64/npiperelay.exe"

- name: Configure Windows SSH agent forwarding
  copy:
    dest: /etc/profile.d/wsl-ssh-agent.sh
    content: |
      if [ -n "$SSH_CONNECTION" ] || [ -n "$SSH_AUTH_SOCK" ]; then
        return 0
      fi

      # Forward Windows SSH agent to WSL via npiperelay
      if [ -e /proc/sys/fs/binfmt_misc/WSLInterop ] || [ -n "$WSL_DISTRO_NAME" ]; then
        export SSH_AUTH_SOCK="$HOME/.ssh/agent.sock"
        if ! ss -a 2>/dev/null | grep -q "$SSH_AUTH_SOCK"; then
          rm -f "$SSH_AUTH_SOCK"
          setsid socat UNIX-LISTEN:"$SSH_AUTH_SOCK",fork \
            EXEC:"$HOME/go/bin/windows_amd64/npiperelay.exe -ei -s //./pipe/openssh-ssh-agent",nofork &>/dev/null &
          disown
        fi
      fi
    mode: "0644"
