- name: Add NodeSource GPG key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Add NodeSource repository
  apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/nodesource.asc]
      https://deb.nodesource.com/node_{{ node_version }}.x nodistro main
    filename: nodesource

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true

- name: Install pnpm globally
  npm:
    name: pnpm
    global: true
    version: "{{ pnpm_version }}"
    state: present

- name: Install OpenAI Codex CLI for user
  shell: |
    npm install -g @openai/codex@latest
  environment:
    npm_config_prefix: "/home/{{ user }}/.local"
  args:
    creates: "/home/{{ user }}/.local/bin/codex"
  become: true
  become_user: "{{ user }}"
