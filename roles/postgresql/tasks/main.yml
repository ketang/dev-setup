- name: Add PostgreSQL GPG key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: "0644"

- name: Add PostgreSQL repository
  apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/postgresql.asc]
      https://apt.postgresql.org/pub/repos/apt
      {{ ansible_facts["distribution_release"] }}-pgdg main
    filename: pgdg

- name: Install PostgreSQL server and client
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - libpq-dev
    state: present
    update_cache: true

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: true
    state: started

- name: Create dev user with superuser privileges
  shell: |
    sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ user }}'" | grep -q 1 \
      || sudo -u postgres createuser --superuser {{ user }}
  args:
    executable: /bin/bash
